<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knew you would say yes!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');


body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: white;
    font-family: "Nunito", sans-serif;
}

.container {
    text-align: center;
}

.header_text {
    font-size: 3em;
    color: #d32f2f;
}

.gif_container img {
    width: 300px; 
    max-width: 500px; 
    height: auto; 
}

   /* ── BUTTONS (original class names kept) ── */
    .btn {
      position: absolute;
      border: none;
      border-radius: 50px;
      padding: 14px 30px;
      font-family: 'Quicksand', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.4px;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      user-select: none;
      text-decoration: none;
      display: inline-block;
    }

    .yes-btn {
      right: 54%;
      background: linear-gradient(155deg, #ff6eb4 0%, #e84e9c 48%, #c72d6f 100%);
      color: #fff;
      box-shadow:
        0 5px 0 #8b1a3e,
        0 9px 26px rgba(200,40,110,0.55),
        inset 0 1px 0 rgba(255,255,255,0.28);
      text-shadow: 0 1px 3px rgba(100,0,40,0.4);
    }
    .yes-btn:hover {
      transform: translateY(-3px) scale(1.06);
      box-shadow: 0 8px 0 #8b1a3e, 0 16px 34px rgba(200,40,110,0.65), inset 0 1px 0 rgba(255,255,255,0.28);
      background-color: #ffa4b1; /* original hover color honored */
    }
    .yes-btn:active {
      transform: translateY(4px) scale(0.97);
    }
  </style>
</head>
<body>
    <div class="container">
        <h1 class="header_text">Knew you would say yes!</h1>
        <div class="gif_container">
            <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif">
        </div>
         <a class="yes-btn btn js-yes-btn" href="index.html">ARE SURE YES😍</a>
    </div>
</body>
</html>
