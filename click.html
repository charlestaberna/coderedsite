<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <title>Do you love me?</title>
  <style>

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:      #ff4d8d;
      --rose-dark: #c72d64;
      --rose-deep: #8b1a3e;
      --blush:     #ffd6e8;
      --gold:      #f0c060;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #3d0020 0%, #1a000e 55%, #0d0007 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── CANVAS ── */
    #particle-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── GLOW ORBS ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
    }
    .orb-1 { width:500px;height:500px;background:rgba(255,60,120,0.13);top:-120px;left:-120px;animation:drift 13s ease-in-out infinite alternate; }
    .orb-2 { width:400px;height:400px;background:rgba(180,20,80,0.11);bottom:-100px;right:-100px;animation:drift 16s ease-in-out infinite alternate-reverse; }
    .orb-3 { width:260px;height:260px;background:rgba(255,100,150,0.09);top:40%;left:65%;animation:drift 10s ease-in-out infinite alternate; }
    @keyframes drift {
      from { transform:translate(0,0) scale(1); }
      to   { transform:translate(40px,30px) scale(1.18); }
    }

    /* ── STAGE ── */
    .stage { position:relative; z-index:10; perspective:1100px; }

    /* ── 3D CARD ── */
    .card {
      width: 390px;
      min-height: 480px;
      background: linear-gradient(155deg, rgba(255,255,255,0.075) 0%, rgba(255,255,255,0.018) 100%);
      border: 1px solid rgba(255,140,180,0.22);
      border-radius: 34px;
      padding: 40px 38px 36px;
      text-align: center;
      position: relative;
      transform-style: preserve-3d;
      animation: cardFloat 8s ease-in-out infinite;
      box-shadow:
        0 0 0 1px rgba(255,100,150,0.08),
        0 8px 0 rgba(160,30,75,0.65),
        0 16px 0 rgba(110,10,45,0.45),
        0 28px 55px rgba(0,0,0,0.75),
        0 55px 110px rgba(200,20,80,0.13),
        inset 0 1px 0 rgba(255,255,255,0.11),
        inset 0 0 50px rgba(255,60,120,0.035);
      -webkit-backdrop-filter: blur(22px);
      backdrop-filter: blur(22px);
    }

    /* glass top line */
    .card::before {
      content:'';
      position:absolute;
      top:0; left:12%; right:12%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.38),transparent);
      border-radius:50%;
    }
    /* inner highlight */
    .card::after {
      content:'';
      position:absolute; inset:0;
      border-radius:34px;
      background:linear-gradient(160deg,rgba(255,200,220,0.055) 0%,transparent 55%);
      pointer-events:none;
    }

    @keyframes cardFloat {
      0%   { transform:rotateX(5deg) rotateY(-4deg) translateY(0px); }
      25%  { transform:rotateX(3deg) rotateY(6deg)  translateY(-7px); }
      50%  { transform:rotateX(-4deg) rotateY(3deg) translateY(-11px); }
      75%  { transform:rotateX(4deg) rotateY(-6deg) translateY(-5px); }
      100% { transform:rotateX(5deg) rotateY(-4deg) translateY(0px); }
    }

    /* ── GOLD CORNERS ── */
    .corner { position:absolute; width:38px; height:38px; opacity:0.38; }
    .corner-tl { top:15px;left:15px;  border-top:1.5px solid var(--gold); border-left:1.5px solid var(--gold); border-radius:8px 0 0 0; }
    .corner-tr { top:15px;right:15px; border-top:1.5px solid var(--gold); border-right:1.5px solid var(--gold); border-radius:0 8px 0 0; }
    .corner-bl { bottom:15px;left:15px;  border-bottom:1.5px solid var(--gold); border-left:1.5px solid var(--gold); border-radius:0 0 0 8px; }
    .corner-br { bottom:15px;right:15px; border-bottom:1.5px solid var(--gold); border-right:1.5px solid var(--gold); border-radius:0 0 8px 0; }

    /* ── SPARKLE DOTS ── */
    .sparkle { position:absolute; pointer-events:none; animation:sparklePop 2.2s ease-in-out infinite; color:var(--gold); font-size:13px; }
    .sparkle:nth-child(1) { top:-10px;left:22px;  animation-delay:0s; }
    .sparkle:nth-child(2) { top:-6px; right:32px; animation-delay:0.75s; font-size:9px; }
    .sparkle:nth-child(3) { bottom:32px;left:-8px;  animation-delay:1.4s; font-size:10px; }
    .sparkle:nth-child(4) { bottom:62px;right:-8px; animation-delay:0.35s; }
    @keyframes sparklePop {
      0%,100%{ transform:scale(0) rotate(0deg); opacity:0; }
      50%    { transform:scale(1) rotate(180deg); opacity:1; }
    }

    /* ── VIDEO ── */
    .local-gif, .gif-result {
      width:100%; max-width:255px;
      border-radius:20px;
      display:block;
      margin:0 auto 26px;
      pointer-events:none;
      box-shadow:
        0 4px 0 rgba(160,30,75,0.55),
        0 8px 0 rgba(110,10,45,0.35),
        0 16px 38px rgba(0,0,0,0.65),
        0 0 0 1px rgba(255,120,170,0.18);
    }
    .gif-result { margin-bottom:20px; }

    /* ── QUESTION TEXT ── */
    .question {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 2.55rem;
      color: transparent;
      background: linear-gradient(130deg, #ffd6e8 0%, #ff8abf 38%, #ff4d8d 65%, #ffd6e8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      background-size: 220% auto;
      animation: shimmer 4s linear infinite;
      margin-bottom: 8px;
      line-height: 1.22;
      letter-spacing: -0.5px;
    }
    @keyframes shimmer {
      0%   { background-position:0% center; }
      100% { background-position:220% center; }
    }

    /* ── RESULT H2 ── */
    .result-container h2 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 2.55rem;
      color: transparent;
      background: linear-gradient(130deg, #ffd6e8 0%, #ff8abf 38%, #ff4d8d 65%, #ffd6e8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      background-size: 220% auto;
      animation: shimmer 4s linear infinite;
      text-align: center;
      margin-bottom: 18px;
      line-height: 1.22;
    }

    /* ── BUTTON CONTAINER (original) ── */
    .button-container {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 22px;
      position: relative;
      min-height: 54px;
    }

    /* ── BUTTONS (original class names kept) ── */
    .btn {
      position: absolute;
      border: none;
      border-radius: 50px;
      padding: 14px 30px;
      font-family: 'Quicksand', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.4px;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      user-select: none;
      text-decoration: none;
      display: inline-block;
    }

    .yes-btn {
      right: 54%;
      background: linear-gradient(155deg, #ff6eb4 0%, #e84e9c 48%, #c72d6f 100%);
      color: #fff;
      box-shadow:
        0 5px 0 #8b1a3e,
        0 9px 26px rgba(200,40,110,0.55),
        inset 0 1px 0 rgba(255,255,255,0.28);
      text-shadow: 0 1px 3px rgba(100,0,40,0.4);
    }
    .yes-btn:hover {
      transform: translateY(-3px) scale(1.06);
      box-shadow: 0 8px 0 #8b1a3e, 0 16px 34px rgba(200,40,110,0.65), inset 0 1px 0 rgba(255,255,255,0.28);
      background-color: #ffa4b1; /* original hover color honored */
    }
    .yes-btn:active {
      transform: translateY(4px) scale(0.97);
      box-shadow: 0 1px 0 #8b1a3e, 0 4px 12px rgba(200,40,110,0.4), inset 0 1px 0 rgba(255,255,255,0.28);
    }

    .no-btn {
      left: 54%;
      background: linear-gradient(155deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.03) 100%);
      color: rgba(255,180,210,0.82);
      border: 1px solid rgba(255,120,170,0.28);
      box-shadow:
        0 5px 0 rgba(120,10,50,0.55),
        0 9px 22px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.09);
      backdrop-filter: blur(10px);
    }
    .no-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 0 rgba(120,10,50,0.55), 0 16px 30px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.09);
      background-color: rgba(255,255,255,0.12);
    }
    .no-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(120,10,50,0.55), inset 0 1px 0 rgba(255,255,255,0.09);
    }

    /* ── RESULT CONTAINER (original) ── */
    .result-container { display: none; }

    /* ── HEART LOADER (original structure, restyled) ── */
    .cssload-main {
      display: none;
      position: relative;
      margin: 40px auto 0;
      width: 80px; height: 120px;
    }
    .cssload-main * { font-size: 62px; }

    .cssload-heart {
      animation: cssload-heart 2.88s cubic-bezier(0.75,0,0.5,1) infinite normal;
      top: 50%; left: 50%; position: absolute;
      filter: drop-shadow(0 0 20px rgba(255,60,120,0.85));
    }
    .cssload-heartL {
      width:1em; height:1em;
      border:1px solid #ff4d8d;
      background: linear-gradient(135deg, #ff6eb4, #e84e9c);
      position:absolute; display:block; border-radius:100%;
      animation: cssload-heartL 2.88s cubic-bezier(0.75,0,0.5,1) infinite normal;
      transform: translate(-28px,-27px);
      box-shadow: 0 0 22px rgba(255,60,120,0.65);
    }
    .cssload-heartR {
      width:1em; height:1em;
      border:1px solid #ff4d8d;
      background: linear-gradient(135deg, #ff6eb4, #e84e9c);
      position:absolute; display:block; border-radius:100%;
      transform: translate(28px,-27px);
      animation: cssload-heartR 2.88s cubic-bezier(0.75,0,0.5,1) infinite normal;
      box-shadow: 0 0 22px rgba(255,60,120,0.65);
    }
    .cssload-square {
      width:1em; height:1em;
      border:1px solid #ff4d8d;
      background: linear-gradient(135deg, #ff6eb4, #e84e9c);
      position:relative; display:block;
      transform: scale(1) rotate(-45deg);
      animation: cssload-square 2.88s cubic-bezier(0.75,0,0.5,1) infinite normal;
      box-shadow: 0 0 22px rgba(255,60,120,0.65);
    }
    .cssload-shadow {
      top:97px; left:50%;
      position:relative; display:block;
      bottom:-0.5em; width:1em; height:0.24em;
      background: rgba(255,60,120,0.18);
      border: 1px solid rgba(255,60,120,0.18);
      border-radius:50%;
      animation: cssload-shadow 2.88s cubic-bezier(0.75,0,0.5,1) infinite normal;
    }

    /* loader text */
    .loader-label {
      display: none;
      font-size: 12px;
      color: rgba(255,160,200,0.55);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      animation: blink 1.2s ease-in-out infinite;
      margin-top: 18px;
      text-align: center;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    /* ── ORIGINAL KEYFRAMES ── */
    @keyframes cssload-square {
      50%  { border-radius:100%; transform:scale(0.5) rotate(-45deg); }
      100% { transform:scale(1) rotate(-45deg); }
    }
    @keyframes cssload-heart {
      50%  { transform:rotate(360deg); }
      100% { transform:rotate(720deg); }
    }
    @keyframes cssload-heartL {
      60% { transform:translate(-28px,-27px) scale(0.4); }
    }
    @keyframes cssload-heartR {
      40% { transform:translate(28px,-27px) scale(0.4); }
    }
    @keyframes cssload-shadow {
      50% { transform:scale(0.5); border-color:rgba(255,60,120,0.08); }
    }

    /* ── ORIGINAL CONTAINER CLASS ── */
    .container { position: relative; }
    .question-container { position: relative; transition: 0.2s; }

  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particle-canvas"></canvas>

  <div class="stage">
    <div class="card" id="card">

      <!-- Gold corners -->
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <!-- Sparkles -->
      <span class="sparkle">✦</span>
      <span class="sparkle">✦</span>
      <span class="sparkle">✦</span>
      <span class="sparkle">✦</span>

      <!-- ══ ORIGINAL HTML STRUCTURE (untouched) ══ -->

      <div class="question-container container">
        <video class="local-gif" src="Reply me love.mp4" autoplay muted loop></video>
        <h2 class="question">Do you love me?</h2>
        <div class="button-container">
          <button class="yes-btn btn js-yes-btn">Yes</button>
          <button class="no-btn btn js-no-btn">No</button>
        </div>
      </div>

      <div class="result-container container">
        <video class="gif-result" src="Love me.mp4" autoplay loop></video>
        <h2 class="question">I knew it😍!</h2>
        <div class="button-container">
          <a class="yes-btn btn js-yes-btn" href="my valentine.html">ilove u</a>
        </div>
      </div>

      <div class="cssload-main">
        <div class="cssload-heart">
          <span class="cssload-heartL"></span>
          <span class="cssload-heartR"></span>
          <span class="cssload-square"></span>
        </div>
        <div class="cssload-shadow"></div>
      </div>

      <div class="loader-label" id="loader-label">processing your love...</div>

      <!-- ══ ORIGINAL JAVASCRIPT (untouched) ══ -->
      <script>
        const questionContainer = document.querySelector(".question-container");
        const resultContainer   = document.querySelector(".result-container");
        const gifResult         = document.querySelector(".gif-result");
        const heartLoader       = document.querySelector(".cssload-main");
        const yesBtn            = document.querySelector(".js-yes-btn");
        const noBtn             = document.querySelector(".js-no-btn");

        // change the position of no button
        noBtn.addEventListener("mouseover", () => {
          const newX = Math.floor(Math.random() * questionContainer.offsetWidth);
          const newY = Math.floor(Math.random() * questionContainer.offsetWidth);
          noBtn.style.left = `${newX}px`;
          noBtn.style.top  = `${newY}px`;
        });

        // yes button functionality
        yesBtn.addEventListener("click", () => {
          questionContainer.style.display = "none";
          heartLoader.style.display = "inherit";
          document.getElementById("loader-label").style.display = "block";

          const timeoutId = setTimeout(() => {
            heartLoader.style.display = "none";
            document.getElementById("loader-label").style.display = "none";
            resultContainer.style.display = "inherit";
            gifResult.play();
          }, 3000);
        });
      </script>

    </div>
  </div>

  <!-- ══ PARTICLE SYSTEM ══ -->
  <script>
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, pts = [];

    function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const COLS = ['#ff4d8d','#ff8abf','#ffd6e8','#f0c060','#c72d64','#ff6eb4','#ffe0f0'];

    function Pt() {
      this.reset = function() {
        this.x  = Math.random() * W;
        this.y  = H + 40;
        this.sz = Math.random() * 12 + 5;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = -(Math.random() * 0.7 + 0.25);
        this.a  = Math.random() * Math.PI * 2;
        this.va = (Math.random() - 0.5) * 0.025;
        this.op = Math.random() * 0.45 + 0.18;
        this.fd = Math.random() * 0.0025 + 0.001;
        this.c  = COLS[Math.floor(Math.random() * COLS.length)];
      };
      this.reset();
      this.y = Math.random() * H; // scatter initially
    }

    Pt.prototype.draw = function() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.a);
      ctx.globalAlpha = this.op;
      ctx.fillStyle   = this.c;
      ctx.shadowColor = this.c;
      ctx.shadowBlur  = 10;
      const s = this.sz;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.28);
      ctx.bezierCurveTo( s*0.5, -s,  s, -s*0.38, 0,  s*0.52);
      ctx.bezierCurveTo(-s, -s*0.38, -s*0.5, -s, 0, -s*0.28);
      ctx.fill();
      ctx.restore();
    };

    Pt.prototype.update = function() {
      this.x += this.vx; this.y += this.vy;
      this.a += this.va; this.op -= this.fd;
    };

    for (let i = 0; i < 65; i++) pts.push(new Pt());

    (function loop() {
      ctx.clearRect(0,0,W,H);
      pts.forEach((p,i) => {
        p.update(); p.draw();
        if (p.op <= 0 || p.y < -50) { pts[i] = new Pt(); }
      });
      requestAnimationFrame(loop);
    })();
  </script>

</body>
</html>
